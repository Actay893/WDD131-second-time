<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Donate to Vesta — help refugee families in Idaho with hygiene products, household essentials, gift cards, and more." />
  <title>Donate — Vesta Nonprofit</title>
  <link rel="icon" type="image/x-icon" href="images/vesta light favicon.jpeg">
  <link rel="preload" as="image" href="images/vesta main brand.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Montserrat:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Montserrat:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="vesta1.css"/>
 
 
</head>
 
<body>
 
  <!-- =====================
       NAV BAR
  ===================== -->
  <button id="theme-toggle" class="theme-btn">Switch to Space Mode 🚀</button>
  <header class="navbar">
    <div class="logo-container">
     <img src="images/vesta main brand.png" alt="Vesta Logo" class="main-logo light-logo" width="200" height="80">
     <img src="images/vesta main brand dark.png" alt="Vesta Logo" class="main-logo dark-logo" width="200" height="80">
    </div>
    <nav>
      <a href="vesta.html">Home</a>
      <a href="donations.html">Donate</a>
      <a href="contact.html" class="btn-nav">Contact</a>
    </nav>
  </header>
 
 
  <!-- =====================
       PAGE INTRO
  ===================== -->
  <div class="container">
    <div class="donations-hero">
      <h1>Make a Difference</h1>
      <p>
        Every item on this list goes directly to someone who needs it.
        Browse below, pick something that speaks to you, and click
        <strong>Donate This</strong> <a href="https://www.amazon.com/registries/gl/guest-view/MEA84OXSYVWK?ref_=cm_sw_r_apin_ggr-subnav-share_4MSVTBRXNX5BYFNVPWGF&language=en-US" target="_blank" rel="noopener noreferrer">here</a> to be taken to our donation page.
      </p>
 
      <!-- Search Bar -->
      <div class="search-wrapper">
        <input
          type="text"
          id="search-input"
          placeholder="Search items... (e.g. shampoo, gift card)"
          oninput="filterItems()"
        />
      </div>
 
      <!-- Category Filter Tabs -->
      <div class="filter-tabs">
        <button class="tab-btn active" onclick="setTab(this, 'all')">All Items</button>
        <button class="tab-btn" onclick="setTab(this, 'hygiene')">Hygiene</button>
        <button class="tab-btn" onclick="setTab(this, 'household')">Household</button>
        <button class="tab-btn" onclick="setTab(this, 'gift-card')">Gift Cards</button>
        <button class="tab-btn" onclick="setTab(this, 'kitchenware')">Kitchenware</button>
      </div>
    </div>
 
 
    <!-- =====================
         DONATION CARDS GRID
         Cards are built and injected here by donations.js
    ===================== -->
    <div class="donations-grid" id="donations-grid"></div>
  </div>
 
 
  <!-- =====================
       FOOTER
  ===================== -->
  <div class="footer">
    <p>&copy; 2026 Vesta Design Studio. All rights reserved.</p>
  </div>
 
 
  <!-- =====================
       JAVASCRIPT
       This one line loads donations.js from the same folder.
  ===================== -->
  <script src="vesta.js"></script>
  <script src="donations.js"></script>
 
</body>
</html>
